<section class="values-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">
        The Pillars of <span class="text-accent">PoornaVeda</span>
      </h2>
      <p class="section-subtitle">Four sacred principles that guide everything we create</p>
    </div>

    <div class="values-grid">
      <div class="value-card" *ngFor="let value of values">
        <div class="icon-circle">
          <i [class]="'fa-solid ' + value.icon"></i>
        </div>
        <h3 class="value-title">{{ value.title }}</h3>
        <p class="value-desc">{{ value.description }}</p>
      </div>
    </div>
  </div>
</section>
