<div class="cart-overlay" *ngIf="isOpen" (click)="closeSheet()"></div>

<div class="cart-sheet" [class.open]="isOpen">
  <div class="cart-header">
    <div class="header-top">
      <h2>Your Cart</h2>
      <button class="close-btn" (click)="closeSheet()" aria-label="Close cart">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="cart-count-badge" *ngIf="cartItems.length > 0">
      {{ cartItems.length }} {{ cartItems.length === 1 ? 'Item' : 'Items' }}
    </div>
  </div>

  <div class="cart-body">
    <!-- Empty State -->
    <div *ngIf="cartItems.length === 0" class="empty-cart">
      <div class="empty-icon">
        <i class="fa-solid fa-cart-shopping"></i>
      </div>
      <p>Your cart is empty</p>
      <button class="primary-btn" (click)="closeSheet()">Continue Shopping</button>
    </div>

    <!-- Items List -->
    <div class="cart-items" *ngIf="cartItems.length > 0">
      <div class="cart-item" *ngFor="let item of cartItems">
        <div class="item-image">
          <img [src]="item.imageUrl" [alt]="item.ProductName" />
        </div>
        <div class="item-details">
          <div class="item-title-row">
            <h3 class="item-name">{{ item.ProductName }}</h3>
            <button class="remove-item-btn" (click)="removeItem(item.cartItemId)" title="Remove item">
              <i class="fa-regular fa-trash-can"></i>
            </button>
          </div>
          <p class="item-category">{{ item.category }}</p>
          <div class="item-price-qty">
            <div class="qty-control">
              <button (click)="updateQuantity(item.Id, item.quantity - 1)" [disabled]="item.quantity <= 1">
                <i class="fa-solid fa-minus"></i>
              </button>
              <span class="qty-value">{{ item.quantity }}</span>
              <button (click)="updateQuantity(item.Id, item.quantity + 1)">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
            <div class="item-price">₹{{ item.price * item.quantity }}</div>
          </div>
          <div class="out-of-stock-warning" *ngIf="item.itemOutStock">
            <i class="fa-solid fa-circle-exclamation"></i> Out of stock
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="cart-footer" *ngIf="cartItems.length > 0">
    <div class="summary-row">
      <span>Subtotal</span>
      <span class="subtotal-amount">₹{{ total }}</span>
    </div>
    <p class="shipping-note">Taxes and shipping calculated at checkout</p>
    <button class="checkout-btn primary-btn" (click)="onClickProceed()">
      Checkout Now
      <i class="fa-solid fa-arrow-right"></i>
    </button>
  </div>
</div>
