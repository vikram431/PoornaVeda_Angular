<!-- Overlay -->
<div class="overlay" 
     *ngIf="isOpen"
     (click)="closeSheet()">
</div>

<!-- Cart Sheet -->
<div class="sheet" [class.open]="isOpen">

  <div class="sheet-header">
    <h2>Shopping Cart</h2>
    <button class="close-btn" (click)="closeSheet()">✖</button>
  </div>
  <!-- If user is not logged in -->
  <div *ngIf="!session" class="empty-box">
    <p>Please sign in to view your cart</p>
  </div>

  <div *ngIf="session">

    <div *ngIf="loading" class="empty-box">
      <p>Loading...</p>
    </div>

    <div *ngIf="!loading && cartItems.length === 0" class="empty-box">
      <p>Your cart is empty</p>
    </div>

    <div class="items-container" *ngIf="cartItems.length > 0">
      
      <div class="cart-item" *ngFor="let item of cartItems">

        <img *ngIf="item.product_image"
             [src]="item.product_image"
             class="item-img">

        <div class="item-info">
          <h3>{{ item.ProductName }}</h3>
          <p class="price">₹{{ item.price }}</p>

          <div class="qty-row">
            <button (click)="updateQuantity(item.Id, item.quantity - 1)">−</button>
            <span>{{ item.quantity }}</span>
            <button (click)="updateQuantity(item.Id, item.quantity + 1)">+</button>

            <button class="remove-btn" (click)="removeItem(item.Id)">🗑</button>
          </div>
        </div>

      </div>

    </div>

    <div class="sheet-footer" *ngIf="cartItems.length > 0">
      <div class="total-row">
        <span>Total:</span>
        <span class="total-amount">₹{{ total.toFixed(2) }}</span>
      </div>

      <button class="checkout-btn" (click)="onClickProceed()">Proceed to Checkout</button>
    </div>

  </div>

</div>
