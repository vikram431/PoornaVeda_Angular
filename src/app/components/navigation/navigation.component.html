<nav class="nav-container" [class.scrolled]="isScrolled">
  <div class="nav-inner container">
    <!-- Left: Mobile Menu Trigger -->
    <button class="mobile-menu-btn md:hidden" (click)="toggleMenu()" aria-label="Toggle menu">
      <i class="fa-solid" [ngClass]="mobileMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>

    <!-- Center: Logo -->
    <div class="logo-container" (click)="navigate('/')">
      <img src="/logo-full.png" alt="PoornaVeda" class="logo" />
    </div>

    <!-- Center/Left: Desktop Links -->
    <div class="nav-links hidden md:flex">
      <a (click)="navigate('/')" class="nav-link" [ngClass]="{ 'active': activeRoute === '/' }">Home</a>
      <a (click)="navigate('/products')" class="nav-link" [ngClass]="{ 'active': activeRoute === '/products' }">Products</a>
      <a (click)="navigate('/about')" class="nav-link" [ngClass]="{ 'active': activeRoute === '/about' }">Our Story</a>
      <a (click)="navigate('/contact')" class="nav-link" [ngClass]="{ 'active': activeRoute === '/contact' }">Contact</a>
    </div>

    <!-- Right: Actions -->
    <div class="nav-actions">
      <button class="icon-btn search-btn" (click)="onSearchClick()" aria-label="Search">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>


      <a (click)="onProfileClick()" class="profile-link" *ngIf="isLoggedIn; else loginButton">
        <i class="fa-regular fa-user"></i>
        <span class="hidden sm:inline">Profile</span>
      </a>

      <button class="icon-btn cart-btn" (click)="onCartClick()" aria-label="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <span *ngIf="cartItemsCount > 0" class="cart-badge">
          {{ cartItemsCount }}
        </span>
      </button>
    </div>

    <ng-template #loginButton>
      <button class="btn-primary sign-in-btn" (click)="navigate('/auth')">Sign In</button>
    </ng-template>
  </div>

</nav>

<!-- Mobile Menu Overlay - Moved outside for better stacking -->
<div *ngIf="mobileMenuOpen" class="mobile-menu-overlay" (click)="toggleMenu()"></div>
<div class="mobile-menu-drawer" [class.open]="mobileMenuOpen">
  <div class="mobile-menu-header">
    <img src="/logo-full.png" alt="PoornaVeda" />
    <button (click)="toggleMenu()" aria-label="Close menu"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="mobile-menu-links">
    <a (click)="navigate('/')" class="mobile-link">Home</a>
    <a (click)="navigate('/products')" class="mobile-link">Products</a>
    <a (click)="navigate('/about')" class="mobile-link">Our Story</a>
    <a (click)="navigate('/contact')" class="mobile-link">Contact</a>
  </div>
</div>
