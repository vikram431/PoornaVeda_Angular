<div class="profile-page">
  <div class="container">
    <div class="profile-layout">
      <!-- Sidebar / Summary -->
      <aside class="profile-sidebar">
        <div class="user-card glass">
          <div class="avatar-large">
            {{ user?.name?.charAt(0) || 'U' }}
          </div>
          <div class="user-basic-info">
            <h2>{{ user?.name }}</h2>
            <p>{{ user?.emailId }}</p>
          </div>
          <div class="member-since">
            Member since Oct 2023
          </div>
        </div>

        <nav class="side-nav">
          <a class="side-nav-link active">
            <i class="fa-solid fa-user"></i>
            Personal Details
          </a>
          <a class="side-nav-link">
            <i class="fa-solid fa-box"></i>
            My Orders
          </a>
          <a class="side-nav-link">
            <i class="fa-solid fa-location-dot"></i>
            Addresses
          </a>
          <button class="logout-btn" (click)="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            Sign Out
          </button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="profile-content">
        <section class="profile-section-card">
          <div class="section-header">
            <h3>Personal Details</h3>
            <button class="edit-btn">Edit Details</button>
          </div>
          
          <div class="details-grid">
            <div class="detail-item">
              <label>Full Name</label>
              <div class="detail-value">{{ user?.name }}</div>
            </div>
            <div class="detail-item">
              <label>Email Address</label>
              <div class="detail-value">{{ user?.emailId }}</div>
            </div>
            <div class="detail-item">
              <label>Phone Number</label>
              <div class="detail-value">+91 9876543210</div>
            </div>
          </div>
        </section>

        <section class="profile-section-card">
          <div class="section-header">
            <h3>Security</h3>
          </div>
          <div class="form-group">
            <label>Update Password</label>
            <div class="password-input-wrapper">
              <input type="password" [(ngModel)]="newPassword" placeholder="Enter new password" />
              <button class="primary-btn sm" (click)="changePassword()">Update</button>
            </div>
            <p class="helper-text">Ensure your password is at least 8 characters long.</p>
          </div>
        </section>
      </main>
    </div>
  </div>
</div>
