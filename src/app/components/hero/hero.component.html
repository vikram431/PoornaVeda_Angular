<section>
  <div class="gradient-earth"></div>

  <div class="container">
    <div class="grid">
      <!-- Left Content -->
      <div class="space-y-8 animate-fade-in">
        <img
          [src]="logoFull"
          alt="PoornaVeda - Complete Indian Wisdom"
          style="height: 80px; width: auto; object-fit: contain;"
        />

        <h1>
          Complete Indian
          <span class="text-primary">Wisdom</span>
        </h1>

        <p>
          A celebration of India's timeless traditions — where purity meets
          authenticity. Experience the wholeness of sacred knowledge through
          handcrafted products rooted in heritage.
        </p>

        <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
          <button class="gradient-sacred">
            Explore Products
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </button>

          <button>Our Story</button>
        </div>
      </div>

      <!-- Right Image -->
      <div class="right-image">
        <div class="circle-primary"></div>
        <div class="circle-secondary"></div>
        <img
          [src]="heroImage"
          alt="Traditional Indian artisanal products"
          class="hero-image"
        />
      </div>
    </div>
  </div>

  <div class="bottom-gradient"></div>
</section>
